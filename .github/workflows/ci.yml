name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Astro type-check
        run: npm run check

      - name: Cross-collection ref check
        run: npm run check:refs

      - name: Secret-leak scan
        run: npm run check:leaks

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Content-drift guard
        # Ensure every public content entry actually emits a page.
        # Fails CI when a new dish/farm/recipe was added but the build can't produce it.
        run: |
          set -euo pipefail
          for kind in dishes farms recipes restaurants; do
            src=$(find "src/content/$kind" -mindepth 1 -maxdepth 1 \( -type d -o -name '*.mdx' \) | wc -l | tr -d ' ')
            built=$(find "dist/$kind" -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l | tr -d ' ')
            echo "$kind: src=$src built=$built"
            if [ "$built" -lt "$src" ]; then
              echo "::error::$kind drift: $built of $src entries built"
              exit 1
            fi
          done

      - name: Upload dist
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 1

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=foodbook --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
